# This workflow will install Swap package dependencies, run tests and lint with a variety of Python versions.

name: HDWallet

on:
  push:
    branches:
      - master
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [master, main]


# PyPI time machine pinned to the date the upstream CVE-2025-69277 fix was
# merged (v3.6.1). The fix requires pynacl>=1.6.2 (released 2026-01-01), so
# the 3.6.0 release date cannot be used.
env:
  PIP_INDEX_URL: https://:2026-02-13T08:38:30Z@time-machines-pypi.sealsecurity.io/

jobs:
  python:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@master
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libsecp256k1-dev
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[cli,tests]
      - name: Test with PyTest with Coverage
        run: |
          coverage run -m pytest
          coverage report
